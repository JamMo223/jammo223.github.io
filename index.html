<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>jammo223</title>

<style>
body {
    margin:0;
    background:#000;   /* 👈 黑色背景 */
    color:#fff;
    font-family: Arial, sans-serif;
}

/* ===== NAV ===== */
.nav {
    display:flex;
    justify-content:center;
    gap:40px;  /* 👈 类目间隔 ≈ 5字符 */
    padding:30px 0;
}

/* 所有链接统一样式 */
.nav a {
    text-decoration:none;
    color:#aaa;   /* 👈 统一灰色 */
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

/* hover 效果 */
.nav a:hover {
    color:red;
}

/* 当前页面高亮 */
.nav a.active {
    color:red;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<a href="index.html">About</a>
<a href="featured.html">Featured Project</a>
<a href="video.html">All Video</a>
<a href="visual.html">Visual</a>
<a href="cgi.html">CGI</a>
<a href="live.html">Live / Installation</a>
<a href="sound.html">Sound</a>
<a href="lab.html">Lab</a>
<a href="contact.html">Contact</a>
</div>

<script>
const links = document.querySelectorAll(".nav a");
links.forEach(link=>{
    if(link.href === window.location.href){
        link.classList.add("active");
    }
});
</script>

</body>
</html>
